<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSFloat Bulk Cart</title>
    <style>
      /* ----------------------------------------------------------------------
         Design tokens
      ---------------------------------------------------------------------- */
      :root {
        --bg: #0d1017;
        --surface: #151a22;
        --surface-2: #1c222c;
        --border: #28303c;
        --border-strong: #38424f;

        --text: #eef1f6;
        --text-muted: #97a1b0;
        --text-faint: #5f6b7a;

        --brand: #38bdf8; /* light blue */
        --brand-hover: #7dd3fc;
        --brand-press: #0ea5e9;
        --on-brand: #062538; /* dark navy text on light blue */

        --success: #36d399;
        --danger: #f0506e;
        --danger-hover: #f3697f;
        --danger-press: #d33f5b;

        --radius: 10px;
        --radius-sm: 8px;
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;

        --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }

      /* ----------------------------------------------------------------------
         Base
      ---------------------------------------------------------------------- */
      * {
        box-sizing: border-box;
      }
      body {
        width: 300px;
        margin: 0;
        padding: 0;
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        line-height: 1.45;
      }

      /* ----------------------------------------------------------------------
         Header
      ---------------------------------------------------------------------- */
      .header {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        padding: var(--space-4) var(--space-5);
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .header h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .header p {
        margin: 2px 0 0;
        font-size: 11px;
        color: var(--text-muted);
      }

      /* ----------------------------------------------------------------------
         Body
      ---------------------------------------------------------------------- */
      .body {
        padding: var(--space-5);
      }

      .field {
        margin-bottom: var(--space-4);
      }
      .field label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        margin-bottom: var(--space-2);
      }
      .input {
        position: relative;
      }
      .input input {
        width: 100%;
        padding: 10px 12px;
        font-size: 15px;
        font-weight: 600;
        font-family: var(--font);
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .input input:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.22);
      }

      /* ----------------------------------------------------------------------
         Buttons
      ---------------------------------------------------------------------- */
      .actions {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        width: 100%;
        padding: 11px 14px;
        font-size: 13px;
        font-weight: 600;
        font-family: var(--font);
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, opacity 0.15s,
          transform 0.05s;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn--primary {
        background: var(--brand);
        color: var(--on-brand);
      }
      .btn--primary:hover {
        background: var(--brand-hover);
      }
      .btn--primary:active {
        background: var(--brand-press);
      }
      .btn--danger {
        background: transparent;
        color: var(--danger);
        border-color: var(--border-strong);
      }
      .btn--danger:hover {
        background: rgba(240, 80, 110, 0.12);
        border-color: var(--danger);
        color: var(--danger-hover);
      }
      .btn--danger:active {
        background: rgba(240, 80, 110, 0.2);
        color: var(--danger-press);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: default;
        transform: none;
      }

      /* ----------------------------------------------------------------------
         Status
      ---------------------------------------------------------------------- */
      .status {
        margin-top: var(--space-4);
        padding: var(--space-3);
        border-radius: var(--radius-sm);
        background: var(--surface);
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-muted);
        white-space: pre-line;
        display: none;
      }
      .status.is-visible {
        display: block;
      }
      .status.is-success {
        border-color: rgba(54, 211, 153, 0.4);
        color: var(--success);
      }
      .status.is-error {
        border-color: rgba(240, 80, 110, 0.4);
        color: var(--danger);
      }

      .footer {
        padding: 0 var(--space-5) var(--space-4);
        font-size: 11px;
        color: var(--text-faint);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div>
        <h1>CSFloat Bulk Cart</h1>
        <p>Add or clear listings in one click</p>
      </div>
    </header>

    <div class="body">
      <div class="field">
        <label for="count">Number of items to add</label>
        <div class="input">
          <input id="count" type="number" min="1" value="25" />
        </div>
      </div>

      <div class="actions">
        <button id="add" class="btn btn--primary">Add first N to cart</button>
        <button id="remove" class="btn btn--danger">Remove all from cart</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="footer">
      Open a CSFloat search page, then run an action. Clicks fire instantly with
      no delay.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
